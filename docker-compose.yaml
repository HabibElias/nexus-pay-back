services:
    db:
        image: postgres:16-alpine
        container_name: nexus-db
        restart: unless-stopped
        env_file: .env
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "0.0.0.0:42364:5432"
        volumes:
            - db_data:/var/lib/postgresql/data

    payment:
        image: golang:1.26.0
        container_name: nexus-payment
        command: sh -c "go install github.com/air-verse/air@latest && /go/bin/air -c .air.toml"
        restart: unless-stopped
        depends_on:
            - db
        working_dir: /app
        env_file:
            - .env
        environment:
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_NAME: ${DB_NAME}
            PORT: ${PORT}
        volumes:
            - .:/app # Mount your entire project
            - air_tmp:/tmp # Air uses tmp folder
        ports:
            - "8080:8080"
            - "50051:50051"

volumes:
    db_data:
    air_tmp:
